services:
  db:
    image: ${DOCKER_PROXY}mariadb:10.11
    container_name: nextcloud_db
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
    networks:
      - nextcloud_network

  valkey:
    image: ${DOCKER_PROXY}valkey/valkey:alpine
    container_name: nextcloud_valkey
    restart: unless-stopped
    networks:
      - nextcloud_network

  app:
    image: ${DOCKER_PROXY}nextcloud:stable
    container_name: nextcloud_app
    restart: unless-stopped
    ports:
      - 8080:8080
    depends_on:
      - db
      - valkey
    volumes:
      - ./data:/var/www/html
      - ./apps:/var/www/html/custom_apps
      - ./config:/var/www/html/config
    environment:
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db
      - REDIS_HOST=valkey
      # S3 Object Storage configuration (uncomment to use external MinIO at s3.company.local)
      # - OBJECTSTORE_S3_HOST=s3.company.local
      # - OBJECTSTORE_S3_PORT=443
      # - OBJECTSTORE_S3_BUCKET=nextcloud
      # - OBJECTSTORE_S3_ACCESS_KEY=${S3_ACCESS_KEY}
      # - OBJECTSTORE_S3_SECRET_KEY=${S3_SECRET_KEY}
      # - OBJECTSTORE_S3_USE_SSL=true
      # - OBJECTSTORE_S3_USE_PATH_STYLE=true
    networks:
      - nextcloud_network

volumes:
  db_data:

networks:
  nextcloud_network:
    driver: bridge
    name: nextcloud_network
